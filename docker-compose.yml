version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: sima_arome_db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sima_secret
      POSTGRES_DB: sima_arome
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
